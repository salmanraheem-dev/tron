<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>USDT TRON Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f14;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 380px;
      background: #111827;
      border-radius: 20px;
      padding: 25px;
    }

    .title {
      text-align: center;
      font-size: 20px;
      margin-bottom: 20px;
    }

    .input-box {
      background: #1f2937;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 16px;
    }

    .pay-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="title">Send USDT (TRON)</div>

    <div class="input-box">
      <input id="amount" type="number" placeholder="Enter amount (USDT)" />
    </div>

    <button class="pay-btn" onclick="pay()">Pay Now</button>
  </div>

  <script>
    function pay() {
      const amount = document.getElementById("amount").value;

      if (!amount || amount <= 0) {
        alert("Enter valid amount");
        return;
      }

      // ✅ Your TRON wallet
      const receiver = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";

      // ✅ DO NOT convert to SUN
      const url = `https://link.trustwallet.com/send?coin=195&address=${receiver}&amount=${amount}`;

      window.location.href = url;
    }
  </script>

</body>
</html>
