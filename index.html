<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>USDT TRON Actions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f14;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 380px;
      background: #111827;
      border-radius: 20px;
      padding: 25px;
      text-align: center;
    }

    .title {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .pay { background: #22c55e; color: white; }
    .approve { background: #f59e0b; color: white; }

    .info {
      margin-top: 15px;
      font-size: 13px;
      color: #9ca3af;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #22c55e;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="title">USDT (TRON)</div>

    <!-- ✅ PAYMENT -->
    <button class="btn pay" onclick="pay()">
      Send 10 USDT
    </button>

    <!-- ⚠️ APPROVAL -->
    <button class="btn approve" onclick="startApproveFlow()">
      Approve 10 USDT (permission)
    </button>

    <div class="info">
      Approval allows this address to spend your USDT later. This is NOT a payment.
    </div>

    <div id="status" class="status"></div>

  </div>

  <script>
    const receiver = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";
    const CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
    const AMOUNT = 10 * 1e6;

    // ✅ PAYMENT (always works)
    function pay() {
      const url = `https://link.trustwallet.com/send?coin=195&address=${receiver}&amount=10`;
      window.location.href = url;
    }

    // 🟡 START APPROVE FLOW
    function startApproveFlow() {

      document.getElementById("status").innerText = "Opening wallet...";

      // If NOT inside wallet → open wallet browser
      if (!window.tronWeb) {
        const url = encodeURIComponent(window.location.href + "?approve=1");
        window.location.href = `https://link.trustwallet.com/open_url?url=${url}`;
        return;
      }

      // Inside wallet → trigger approve
      approve();
    }

    // 🟡 APPROVE FUNCTION (must be user-triggered)
    function approve() {
      document.getElementById("status").innerText = "Waiting for wallet approval...";

      window.tronWeb.contract().at(CONTRACT).then(contract => {
        contract.approve(receiver, AMOUNT).send({
          feeLimit: 100000000
        }).then(tx => {
          document.getElementById("status").innerText = "Approved successfully ✅";
        }).catch(err => {
          document.getElementById("status").innerText = "Approval cancelled ❌";
        });
      });
    }

    // 🔥 HANDLE REDIRECT CASE
    window.addEventListener("load", () => {
      const params = new URLSearchParams(window.location.search);

      if (params.get("approve") === "1") {
        document.getElementById("status").innerText =
          "Tap 'Approve' again to continue";
      }
    });
  </script>

</body>
</html>
