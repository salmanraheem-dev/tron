<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TRON USDT dApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f14;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 380px;
      background: #111827;
      border-radius: 20px;
      padding: 25px;
      text-align: center;
    }

    .title {
      font-size: 20px;
      margin-bottom: 15px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .connect { background: #3b82f6; }
    .pay { background: #22c55e; }
    .approve { background: #f59e0b; }

    .address {
      margin-top: 10px;
      font-size: 12px;
      color: #9ca3af;
      word-break: break-all;
    }

    .info {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="title">TRON USDT dApp</div>

    <!-- CONNECT BUTTON -->
    <button id="connectBtn" class="btn connect" onclick="connectWallet()">
      Connect TRON Wallet
    </button>

    <!-- WALLET ADDRESS -->
    <div id="address" class="address"></div>

    <!-- ACTION BUTTONS -->
    <div id="actions" style="display:none;">
      <button class="btn pay" onclick="pay()">Send 10 USDT</button>
      <button class="btn approve" onclick="approve()">Approve 10 USDT</button>

      <div class="info">
        Approval allows spending later. This is NOT a payment.
      </div>
    </div>

  </div>

  <script>
    const receiver = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";
    const CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
    const AMOUNT = 10 * 1e6;

    // 🔥 Auto open inside Trust Wallet if not already
    window.onload = () => {
      if (!window.tronWeb) {
        const url = encodeURIComponent(window.location.href);
        window.location.href = `https://link.trustwallet.com/open_url?url=${url}`;
      }
    };

    // ✅ Connect Wallet
    function connectWallet() {
      if (!window.tronWeb) {
        alert("Opening Trust Wallet...");
        return;
      }

      const address = window.tronWeb.defaultAddress.base58;

      if (!address) {
        alert("Please unlock wallet");
        return;
      }

      document.getElementById("address").innerText =
        "Connected: " + address;

      document.getElementById("connectBtn").style.display = "none";
      document.getElementById("actions").style.display = "block";
    }

    // ✅ Payment
    function pay() {
      const url = `https://link.trustwallet.com/send?coin=195&address=${receiver}&amount=10`;
      window.location.href = url;
    }

    // ⚠️ Approval
    function approve() {
      if (!window.tronWeb) {
        alert("Wallet not detected");
        return;
      }

      window.tronWeb.contract().at(CONTRACT).then(contract => {
        contract.approve(receiver, AMOUNT).send({
          feeLimit: 100000000
        });
      });
    }
  </script>

</body>
</html>
