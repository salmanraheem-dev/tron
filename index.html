<!DOCTYPE html>
<html>
<head>
  <title>TRON Payment</title>
</head>
<body>

<h2>Pay with TRON USDT</h2>

<input id="amount" placeholder="Enter USDT amount" />
<button onclick="pay()">Pay Now</button>

<script>
function pay() {
  const amount = document.getElementById("amount").value;

  // Your TRON address
  const to = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";

  // USDT TRC20 contract
  const contract = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";

  // Convert amount to SUN (6 decimals)
  const value = parseFloat(amount) * 1e6;

  // Encode transfer(address,uint256)
  const data =
    "a9059cbb" +
    to.replace("T", "").padStart(64, "0") +
    value.toString(16).padStart(64, "0");

  const url = `https://link.trustwallet.com/send?coin=195&contract=${contract}&data=${data}`;

  window.location.href = url;
}
</script>

</body>
</html>
