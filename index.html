<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TRON USDT Actions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f14;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 380px;
      background: #111827;
      border-radius: 20px;
      padding: 25px;
      text-align: center;
    }

    .title {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .pay {
      background: #22c55e;
      color: white;
    }

    .approve {
      background: #f59e0b;
      color: white;
    }

    .note {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="title">USDT (TRON)</div>

    <button class="btn pay" onclick="pay()">
      Send 10 USDT
    </button>

    <button class="btn approve" onclick="approve()">
      Approve 10 USDT (permission)
    </button>

    <div class="note">
      Approval allows this address to spend your USDT later. This is NOT a payment.
    </div>
  </div>

  <script>
    const receiver = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";

    // ✅ Payment (safe)
    function pay() {
      const url = `https://link.trustwallet.com/send?coin=195&address=${receiver}&amount=10`;
      window.location.href = url;
    }

    // ⚠️ Approval (advanced)
    function approve() {

      if (!window.tronWeb) {
        alert("Open this inside TronLink / Trust Wallet dApp browser");
        return;
      }

      const CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; // USDT
      const AMOUNT = 10 * 1e6; // 10 USDT in SUN

      window.tronWeb.contract().at(CONTRACT).then(contract => {
        contract.approve(receiver, AMOUNT).send({
          feeLimit: 100000000
        });
      });
    }
  </script>

</body>
</html>
