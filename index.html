<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>USDT TRON Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f14;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 380px;
      background: #111827;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .title {
      font-size: 20px;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
      margin-bottom: 20px;
    }

    .input-box {
      background: #1f2937;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 16px;
    }

    .info {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 15px;
    }

    .pay-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .pay-btn:hover {
      opacity: 0.9;
    }

    .footer {
      margin-top: 15px;
      font-size: 11px;
      text-align: center;
      color: #6b7280;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="title">Send USDT (TRON)</div>
    <div class="subtitle">Fast & Secure Payment</div>

    <div class="input-box">
      <input id="amount" type="number" placeholder="Enter amount (USDT)" />
    </div>

    <div class="info">
      Network: TRON (TRC20)<br/>
      Token: USDT
    </div>

    <button class="pay-btn" onclick="pay()">Pay Now</button>

    <div class="footer">
      You will be redirected to Trust Wallet to confirm the transaction.
    </div>

  </div>

  <script>
    function pay() {
      const amountInput = document.getElementById("amount").value;

      if (!amountInput || amountInput <= 0) {
        alert("Please enter a valid amount");
        return;
      }

      // 🔴 REPLACE WITH YOUR TRON ADDRESS
      const receiver = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";

      // Convert to SUN (6 decimals)
      const amount = Math.floor(parseFloat(amountInput) * 1e6);

      // ✅ Trust Wallet TRON deep link
      const url = `https://link.trustwallet.com/send?coin=195&address=${receiver}&amount=${amount}`;

      // Open wallet
      window.location.href = url;
    }
  </script>

</body>
</html>
